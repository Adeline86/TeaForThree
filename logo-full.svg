    <ellipse cx="60" cy="62" rx="31" ry="7" fill="#6B3A1F" opacity="0.5"/>
    <path d="M98 72 Q124 72 124 86 Q124 100 98 96" fill="none" stroke="#B5763A" stroke-width="1.5"/>
    <path d="M38 48 Q35 33 40 18" fill="none" stroke="#D4A96A" stroke-width="1" opacity="0.6" stroke-linecap="round"/>
    <path d="M60 44 Q57 28 62 12" fill="none" stroke="#D4A96A" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
    <path d="M80 48 Q77 32 82 18" fill="none" stroke="#D4A96A" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
