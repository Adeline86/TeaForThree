    <polygon points="148,0 112,-5 130,0 112,5"/>
    <polygon points="-148,0 -100,-9 -118,0 -100,9"/>
    <polygon points="-148,0 -112,-5 -130,0 -112,5"/>
    <polygon points="105,-105 78,-92 94,-94 92,-78"/>
