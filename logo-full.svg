  <line x1="202" y1="160" x2="222" y2="160" stroke="#B5763A" stroke-width="0.7" opacity="0.5"/>


  <!-- TEA -->
  <text x="390" y="118"
    font-family="'Playfair Display', Georgia, serif"
    font-size="68" font-weight="400"
    fill="#FAF6F0" text-anchor="middle" letter-spacing="6">Tea</text>

  <!-- for -->
  <text x="390" y="152"
    font-family="'Playfair Display', Georgia, serif"
    font-size="22" font-style="italic" font-weight="400"
    fill="#B5763A" text-anchor="middle" letter-spacing="8">for</text>

